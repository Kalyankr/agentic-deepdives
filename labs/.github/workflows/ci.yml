name: labs-ci

on:
  push:
    paths:
      - "labs/**"
  pull_request:
    paths:
      - "labs/**"

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (no heavy torch in CI)
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Smoke tests
        run: uv run pytest tests/test_smoke.py -q
